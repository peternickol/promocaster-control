name: Promocaster Control
branch: master
host:
  shortname: control
requires:
  packages:
    - ffmpeg
    - imagemagick
    - python3
    - python3-pip
    - python3-venv
  commands:
    - ffprobe
    - magick
    - python3
build:
  - python3 -m venv __DATA_DIR__/.venv
  - __DATA_DIR__/.venv/bin/python -m pip install --upgrade pip
  - __DATA_DIR__/.venv/bin/python -m pip install -r requirements.txt
  - __DATA_DIR__/.venv/bin/python -m py_compile backend/main.py backend/control.py bin/promocaster-control
  - __DATA_DIR__/.venv/bin/python -c "import backend.main"
  - PROMOCASTER_CONTROL_DATA_DIR=__DATA_DIR__ PROMOCASTER_CONTROL_REPOS_DIR=__DATA_DIR__/client PROMOCASTER_CONTROL_SYNC_DIR=__DATA_DIR__/sync PROMOCASTER_CONTROL_SSH_DIR=__DATA_DIR__/ssh PROMOCASTER_CONTROL_GIT_CONFIG=__DATA_DIR__/gitconfig PROMOCASTER_CONTROL_SERVICE_USER=__SERVICE_USER__ ./bin/promocaster-control runtime prepare
components:
  service_user: dish-project
  service:
    name: promocaster-control.service
    description: Promocaster Control web service
    command: __DATA_DIR__/.venv/bin/uvicorn backend.main:app --host 127.0.0.1 --port 8080
    working_directory: __APP_DIR__
    restart: on-failure
    restart_sec: 5
  env:
    PROMOCASTER_CONTROL_APP_DIR: __APP_DIR__
    PROMOCASTER_CONTROL_SOURCE_ROOT: __CHECKOUT__
    PROMOCASTER_CONTROL_ASSETS_DIR: __APP_DIR__/assets
    PROMOCASTER_CONTROL_TEMPLATE_DIR: __APP_DIR__/backend/templates
    PROMOCASTER_CONTROL_DATA_DIR: __DATA_DIR__
    PROMOCASTER_CONTROL_REPOS_DIR: __DATA_DIR__/client
    PROMOCASTER_CONTROL_SYNC_DIR: __DATA_DIR__/sync
    PROMOCASTER_CONTROL_SSH_DIR: __DATA_DIR__/ssh
    PROMOCASTER_CONTROL_CLIENT_GITHUB_KEY: __DATA_DIR__/ssh/client_github_key
    PROMOCASTER_CONTROL_GIT_CONFIG: __DATA_DIR__/gitconfig
    PROMOCASTER_CONTROL_SERVICE_USER: __SERVICE_USER__
  bin:
    promocaster-control: __APP_DIR__/bin/promocaster-control
  caddy:
    site: control.promocaster.io
    reverse_proxy: 127.0.0.1:8080
    directives:
  firewall:
    allow:
database:
  engine:
  schema:
publish:
  source: .
refresh:
  commands:
