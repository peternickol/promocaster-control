<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Inspector - Promocaster Control</title>
  <link rel="stylesheet" href="/assets/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/css/control.css">
  <link rel="stylesheet" href="/assets/css/inspector.css">
  <script src="/assets/vendor/bootstrap/bootstrap.bundle.min.js" defer></script>
  <script src="/assets/vendor/lucide/lucide.min.js" defer></script>
  <script src="/assets/js/inspector.js" defer></script>
</head>
<body data-client="phgi">
  <div class="inspector-shell">
    <aside class="location-panel">
      <header class="panel-header">
        <div>
          <p id="client-name" class="app-kicker">Promocaster</p>
          <h1>Inspector</h1>
        </div>
        <div class="header-actions">
          <nav class="tool-nav" aria-label="Tools">
            <a class="is-active" href="/inspector.html"><i data-lucide="scan-search" aria-hidden="true"></i><span>Inspect</span></a>
            <a href="/editor.html"><i data-lucide="square-pen" aria-hidden="true"></i><span>Edit</span></a>
          </nav>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode">
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-option">
                <i data-lucide="sun" aria-hidden="true"></i>
              </span>
              <span class="theme-option">
                <i data-lucide="moon" aria-hidden="true"></i>
              </span>
              <span class="theme-thumb"></span>
            </span>
          </button>
        </div>
      </header>
      <div id="location-list" class="location-list" aria-label="Locations"></div>
    </aside>

    <main class="audit-panel">
      <header class="audit-header">
        <div>
          <p class="eyebrow">Location</p>
          <h2 id="location-title">Loading</h2>
        </div>
        <dl class="summary" id="summary"></dl>
      </header>

      <section class="preview-panel" aria-label="Slide preview">
        <div id="preview" class="preview"></div>
        <div class="preview-meta">
          <div>
            <p class="eyebrow">Selected</p>
            <h3 id="preview-title">No slide selected</h3>
          </div>
          <div class="preview-actions">
            <button id="prev-slide" class="btn btn-outline-secondary btn-sm icon-button" type="button">
              <i data-lucide="chevron-left" aria-hidden="true"></i>
              <span>Previous</span>
            </button>
            <button id="next-slide" class="btn btn-primary btn-sm icon-button" type="button">
              <span>Next</span>
              <i data-lucide="chevron-right" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </section>

      <section>
        <div class="slide-toolbar">
          <h3><i data-lucide="gallery-horizontal-end" aria-hidden="true"></i>Slides</h3>
          <span id="audit-status">Waiting for deck data</span>
        </div>
        <div id="slide-grid" class="slide-grid"></div>
      </section>
    </main>
  </div>

  <script id="all-decks" type="application/json">{"activeLocation":"","locations":[]}</script>
</body>
</html>
